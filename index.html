<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Free YouTube Player</title>
    <style>
        /* ඇප් එකක් වගේ මුළු Screen එකම වැහෙන විදිහට සැකසීම */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0f0f0f; /* YouTube Dark Theme එක */
            overflow: hidden;
        }
        /* YouTube පිටුව පෙන්වන කොටස */
        #youtube-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="youtube-frame" 
        src="https://www.youtube.com/" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <script>
        const iframe = document.getElementById('youtube-frame');

        // AdGuard ශෛලියේ JavaScript එකක් මගින් දැන්වීම් නිරන්තරයෙන් පරීක්ෂා කර ඉවත් කිරීම
        setInterval(() => {
            try {
                // iframe එක ඇතුළේ තියෙන YouTube පිටුව ලබා ගැනීම
                const iframeDocument = iframe.contentDocument || iframe.contentWindow.document;

                if (iframeDocument) {
                    // 1. Skip Ad බටන් එකක් ආවොත් එය ක්ෂණිකව ක්ලික් කිරීම
                    let skipButton = iframeDocument.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern, .ytp-skip-ad-button');
                    if (skipButton) {
                        skipButton.click();
                        console.log("Ad Skipped Automatically!");
                    }

                    // 2. වීඩියෝ අතරමැද සහ මුල් පිටුවේ ඇති බැනර් දැන්වීම් කොටු සැඟවීම
                    let adSelectors = [
                        '.video-ads', '.ytp-ad-module', 'ytd-ad-slot-renderer', 
                        '#player-ads', '#masthead-ad', '.ad-showing', '.ad-container'
                    ];
                    
                    adSelectors.forEach(selector => {
                        let elements = iframeDocument.querySelectorAll(selector);
                        elements.forEach(el => {
                            if (el) el.style.display = 'none';
                        });
                    });
                }
            } catch (e) {
                // ආරක්ෂක හේතු මත (Cross-Origin) සමහර වෙලාවට iframe ඇතුලටම යන්න බැරි වුවහොත් සිදුවන Error වැළැක්වීමට
                console.log("Waiting for player or restriction active.");
            }
        }, 400); // සෑම තත්පර 0.4කට වරක්ම ක්‍රියාත්මක වේ
    </script>

</body>
</html>
